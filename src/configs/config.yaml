# Конфигурация для file_processor

# Общие настройки (базовый шаблон)
default: &default
  min_age: 18

  retry:
    attempts: 3
    delay: 1.0
    backoff: 2.0

    input_file: "data/users.json"
    output_file: "data/processed/users.csv"

    logging:
      level: "INFO"
      format: "%(asctime)s | %(levelname)8s | %(name)s | %(message)s"

  development:
    <<: *default
    min_age: 18
    logging:
      level: "DEBUG"

  production:
    <<: *default
    min_age: 18
    input_file: "/var/data/users.json"
    output_file: "/var/data/processed/users.csv"
    logging:
      level: "WARNING"

  testing:
    <<: *default
    input_file: "/tests/fixtures/users.json"
    output_file: "/tests/fixtures/output.csv"
    min_age: 18